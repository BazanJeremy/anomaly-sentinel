[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    fintech: Fintech/banking sector tests
    medtech: Medical/health sector tests
    ai_behaviour: AI classifier behaviour tests
    schema: Schema contract tests
    slow: Tests requiring external API calls
